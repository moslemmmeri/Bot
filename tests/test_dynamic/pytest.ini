# pytest.ini
# تنظیمات pytest برای پروژه ربات

[pytest]
# حداقل نسخه pytest مورد نیاز
minversion = 7.0

# مسیرهای جستجوی تست
testpaths = tests

# الگوی تشخیص فایل‌های تست
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# تنظیمات مسیر برای importها
pythonpath = .

# نشانه‌های سفارشی (Custom Markers)
markers =
    asyncio: تست‌های async (نیاز به pytest-asyncio)
    slow: تست‌های کند که نیاز به زمان بیشتری دارند
    integration: تست‌های یکپارچه‌سازی که به دیتابیس واقعی نیاز دارند
    unit: تست‌های واحد سریع (پیش‌فرض)
    smoke: تست‌های دود (Smoke Tests) برای بررسی اولیه

# تنظیمات گزارش و خروجی
addopts =
    -v
    --strict-markers
    --tb=short
    --maxfail=1
    --cov=.
    --cov-report=term
    --cov-report=html
    --cov-report=xml
    --cov-config=.coveragerc

# تنظیمات پوشش کد (Code Coverage)
# در صورت وجود فایل .coveragerc، تنظیمات از آن خوانده می‌شود
# در غیر این صورت از تنظیمات زیر استفاده می‌شود
# برای استفاده از تنظیمات پیش‌فرض، فایل .coveragerc را در ریشه پروژه ایجاد کنید

# ============================================================
# تنظیمات برای اجرای تست‌ها در محیط CI/CD
# ============================================================
# برای اجرا در GitHub Actions یا سایر CI:
# pytest --maxfail=1 --disable-warnings -q

# اجرای تست‌ها با گزارش پوشش:
# pytest --cov=. --cov-report=html

# اجرای تست‌های خاص با نشانه:
# pytest -m unit
# pytest -m "not slow"
# pytest -m "integration and not slow"

# ============================================================
# تنظیمات برای Django (در صورت استفاده)
# ============================================================
# django_settings = myproject.settings

# ============================================================
# تنظیمات برای asyncio (pytest-asyncio)
# ============================================================
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# ============================================================
# فیلترهای هشدار (Warning Filters)
# ============================================================
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*pkg_resources.*:DeprecationWarning
    ignore:.*distutils.*:DeprecationWarning
    ignore:.*unclosed.*:ResourceWarning

# ============================================================
# تنظیمات لاگ
# ============================================================
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# ============================================================
# تنظیمات برای نمایش نتیجه تست‌ها
# ============================================================
console_output_style = classic
junit_family = xunit2

# ============================================================
# تنظیمات برای پلاگین‌های pytest
# ============================================================
# برای استفاده از پلاگین‌های زیر، آنها را در requirements-dev.txt اضافه کنید:
# - pytest-asyncio
# - pytest-cov
# - pytest-xdist (برای اجرای موازی)
# - pytest-timeout
# - pytest-mock
# - pytest-randomly

# اجرای موازی با pytest-xdist:
# pytest -n auto

# اجرای با محدودیت زمان:
# pytest --timeout=300

# ============================================================
# تنظیمات نادیده گرفتن دایرکتوری‌ها
# ============================================================
norecursedirs =
    .git
    .hg
    .tox
    .venv
    venv
    env
    __pycache__
    *.egg-info
    .pytest_cache
    .mypy_cache
    .ruff_cache
    build
    dist
    logs
    backups
    exports
    admin_panel/charts
    .idea
    .vscode